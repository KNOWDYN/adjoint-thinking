<!doctype html>
<html lang="{{ html_lang }}" dir="{{ html_dir }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page_title }}</title>
  <meta name="description" content="{{ page_description }}" />
  <meta property="og:title" content="{{ og_title }}" />
  <meta property="og:description" content="{{ page_description }}" />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#cf2e2e" />
  <link rel="stylesheet" href="{{ root_prefix }}assets/site.css?v={{ asset_version }}" />
  <link rel="icon" href="{{ root_prefix }}assets/favicon.svg" type="image/svg+xml" />
  <script id="preference-preload">(function(){var t="adjoint-theme-preference",l="adjoint-locale-preference",m=window.matchMedia&&window.matchMedia("(prefers-color-scheme: dark)").matches,c=localStorage.getItem(t)||"system",r=c==="dark"||c==="system"&&m?"dark":"light",g=localStorage.getItem(l)||((navigator.languages||[navigator.language||"en"]).some(function(x){return String(x).toLowerCase().indexOf("ar")===0})?"ar":"en");document.documentElement.dataset.theme=r;document.documentElement.dataset.themeChoice=c;document.documentElement.lang=g;document.documentElement.dir=g==="ar"?"rtl":"ltr";document.documentElement.dataset.locale=g;})();</script>
</head>
<body id="top" data-page="{{ page_slug }}">
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <header class="topbar">
    <a class="brand" href="{{ root_prefix }}"><span class="brand-mark"></span><span>{{ site_title }}<br><small>Scenario Companion {{ version }}</small></span></a>
    <nav class="topnav" aria-label="Primary navigation">{{ primary_nav }}</nav>
    <div class="topbar-actions"><div class="theme-switcher" role="group" aria-label="Theme preference"><button class="theme-option" type="button" data-theme-option="system" aria-pressed="true">System</button><button class="theme-option" type="button" data-theme-option="light" aria-pressed="false">Light</button><button class="theme-option" type="button" data-theme-option="dark" aria-pressed="false">Dark</button></div><div class="language-switcher" role="group" aria-label="Language"><button class="locale-option" type="button" data-locale-option="en" aria-pressed="true">English</button><button class="locale-option" type="button" data-locale-option="ar" aria-pressed="false">العربية</button></div><button class="machine-translate-button" type="button">Machine translate</button></div>
  </header>
  <div class="site-shell">
    <aside class="left-panel" aria-label="Scenario navigation">
      <div class="search-box"><label for="site-search">Search scenarios and method</label><input id="site-search" type="search" placeholder="Search..." autocomplete="off"><div id="search-results"></div></div>
      {{ left_panel }}
    </aside>
    <main id="main-content" class="content" tabindex="-1">
      {{ content }}
    </main>
    <aside class="right-panel" aria-label="Page graph and related notes">
      {{ right_panel }}
    </aside>
  </div>
  <footer class="footer">
    <p>{{ footer }}</p>
  </footer>
  <script>window.SITE_ROOT_PREFIX = "{{ root_prefix }}";
  window.SITE_INDEX_PATH = "{{ root_prefix }}assets/search-index.json";
  window.SITE_TRANSLATE_PROXY = "{{ translation_proxy }}";</script>
  <script src="{{ root_prefix }}assets/site.js?v={{ asset_version }}"></script>
</body>
</html>
