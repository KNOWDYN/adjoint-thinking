<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page_title }}</title>
  <meta name="description" content="{{ page_description }}" />
  <meta property="og:title" content="{{ og_title }}" />
  <meta property="og:description" content="{{ page_description }}" />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#cf2e2e" />
  <link rel="stylesheet" href="{{ root_prefix }}assets/site.css" />
  <link rel="icon" href="{{ root_prefix }}assets/favicon.svg" type="image/svg+xml" />
</head>
<body id="top" data-page="{{ page_slug }}">
  <header class="topbar">
    <a class="brand" href="{{ root_prefix }}"><span class="brand-mark"></span><span>{{ site_title }}<br><small>Scenario Companion {{ version }}</small></span></a>
    <nav class="topnav" aria-label="Primary navigation">{{ primary_nav }}</nav>
    <div class="topbar-actions" aria-label="Display and language controls">
      <div class="language-switcher">
        <label for="language-select">Language</label>
        <select id="language-select" autocomplete="off">
          <option value="en">English</option>
          <option value="ar">العربية</option>
        </select>
        <button type="button" class="machine-translate-button" data-machine-translate="ar" aria-pressed="false">Machine translate</button>
      </div>
      <div class="theme-switcher" role="group" aria-label="Theme preference">
        <button type="button" class="theme-option" data-theme-option="system">System</button>
        <button type="button" class="theme-option" data-theme-option="light">Light</button>
        <button type="button" class="theme-option" data-theme-option="dark">Dark</button>
      </div>
    </div>
  </header>
  <div class="site-shell">
    <aside class="left-panel" aria-label="Scenario navigation">
      <div class="search-box"><label for="site-search">Search scenarios and method</label><input id="site-search" type="search" placeholder="Search..." autocomplete="off"><div id="search-results"></div></div>
      {{ left_panel }}
    </aside>
    <main class="content" tabindex="-1">
      {{ content }}
    </main>
    <aside class="right-panel" aria-label="Page graph and related notes">
      {{ right_panel }}
    </aside>
  </div>
  <footer class="footer">
    <p>{{ footer }}</p>
  </footer>
  <script>window.SITE_ROOT_PREFIX = "{{ root_prefix }}";
  window.SITE_INDEX_PATH = "{{ root_prefix }}assets/search-index.json";</script>
  <script src="{{ root_prefix }}assets/site.js"></script>
</body>
</html>
